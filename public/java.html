<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        function lavish()
        {
            document.write("declaring a funciton and calling it in for loop for repetition")
        }
        for (i=1;i<=20;i++)
            {
                document.write(i+lavish()+"<br>");
            }
    </script>
</body>
</html>
